# @hotstaq/admin-panel — GitLab CI/CD Pipeline
# Triggers on every push to main.
# Runs the full prepublishOnly build (build-web) and publishes to npm.
# Requires NPM_TOKEN set as a GitLab CI/CD variable.

stages:
  - build
  - publish

build:
  stage: build
  image: node:20-alpine
  script:
    - npm ci
    - npm run build-web
  artifacts:
    paths:
      - build/
      - build-web/
      - public/js/
    expire_in: 1 hour

publish:
  stage: publish
  image: node:20-alpine
  dependencies:
    - build
  script:
    - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
    # --ignore-scripts skips prepublishOnly (which would re-run build-web and
    # need a fresh `npm ci` for tsc). The build stage already produced the
    # full publishable set in build/, build-web/, and public/js/.
    - npm publish --access public --ignore-scripts
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
